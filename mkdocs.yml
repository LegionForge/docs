      - Architecture: framework/architecture.md
      - Security Model: framework/security-model.md
      - Configuration: framework/configuration.md
      - Database: framework/database.md
      - Gateway & API: framework/gateway.md
      - Connectors: framework/connectors.md
      - Threat Events: framework/threat-events.md
      - API Reference: framework/api-reference.md
  - Guardian:
